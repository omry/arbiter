scene:
  id: "install-and-bootstrap"
  title: "Install Arbiter Server"
beats:
  - id: "overview"
    heading: "Overview"
    text: >-
      This video guides you through installing Arbiter for the first time
      using Arbiter's Docker tooling. We create a local command environment,
      create a staging directory, select the IMAP and SMTP plugins, configure
      and test them through the Arbiter client, and finish by reviewing the
      permanent install plan.
  - id: "prepare-cli"
    heading: "Prepare Arbiter Commands"
    text: >-
      First prepare a small Python virtual environment for the Arbiter command
      line tools. This installs `arbiter-server`, which creates the Docker
      staging directory, and `arbiter`, which we use later to test the staged
      server. This environment is only needed while preparing and testing
      staging; after permanent installation, the server runs from the
      installed deployment and no longer depends on it.
  - id: "init-staging"
    heading: "Bootstrap Docker Staging Directory"
    text: >-
      Start by creating a Docker staging directory. This workspace is where
      the operator prepares configuration, builds the runtime bundle, and
      tests the deployment before installing the server and config
      permanently.
  - id: "prepare-bundle"
    heading: "Prepare Mail Bundle"
    text: >-
      This demo uses the IMAP and SMTP plugins. The bundle records the server
      and plugin package set, then prepares the wheelhouse the container
      installs from. That makes later staging runs independent of live package
      resolution.
  - id: "bootstrap-config"
    heading: "Bootstrap Bot Account Files"
    text: >-
      Next create the server config and the bot account scaffolds. Arbiter
      writes separate account and policy files for IMAP and SMTP. The accounts
      describe where the services are; the policies describe what an agent is
      allowed to do through those accounts.
  - id: "review-generated-config"
    heading: "Review Generated Bot Config"
    text: >-
      Before editing, inspect the generated files. The bot has one IMAP
      account, one SMTP account, and matching policies. In a real deployment
      these files point at your mail provider and enforce the access level you
      want agents to have.
  - id: "edit-bot-access"
    heading: "Edit Bot Access"
    text: >-
      For this tutorial the bot is intentionally broad: it can read, search,
      append, mark, move, and delete in the local IMAP mailbox, and it can
      send through the local SMTP account. This is safe here because the
      recording uses disposable mail servers created just for the demo.
  - id: "bootstrap-env"
    heading: "Bootstrap Env File"
    text: >-
      The account files read credentials from the deployment environment. This
      demo uses dedicated local mail servers, so it is okay to show the
      generated username and password. In production, the env file contains
      real secrets and should stay protected.
  - id: "stage-server"
    heading: "Check and Start Staging"
    text: >-
      Before starting the server, run a config check. It verifies the server
      config, the plugin configuration, and the account-to-policy pairs. Then
      start staging on port 18075 and run the helper's server test.
  - id: "client-discovery"
    heading: "Discover with the Arbiter Client"
    text: >-
      Now use the Arbiter client against the staged server. Agents start by
      discovering plugins, then inspect accounts and operation schemas before
      running an operation. They see capabilities and policy-shaped controls,
      not service credentials.
  - id: "send-test-message"
    heading: "Send a Test Message"
    text: >-
      With discovery complete, send a real message through the staged server.
      The SMTP plugin submits the message using the configured bot account.
      The caller provides only the operation input: account name, recipient,
      subject, body, and an idempotency key for safe retries.
  - id: "fetch-test-message"
    heading: "Fetch the Test Message"
    text: >-
      The local SMTP server delivers into the same mailbox that the IMAP
      server exposes. Search the bot inbox by subject, keep the returned IMAP
      UID, then fetch the message body through `imap:get_message`.
  - id: "staging-vs-installed"
    heading: "Staging Versus Installed"
    text: >-
      Staging proves the bundle, configuration, mail access, and client
      operations before any privileged install step. It is still an operator
      workspace, not the long-running production service. The installed
      deployment uses protected ownership, systemd lifecycle management, and
      the production port, 8075.
  - id: "preinstall-check"
    heading: "Preinstall Doctor"
    text: >-
      Before promotion, run the preinstall doctor. Passing `--agent-user
      codex` also checks that the agent identity does not have inappropriate
      access to deployment state. This catches production-install mistakes
      while the deployment is still staged and easy to fix.
  - id: "review-install-plan"
    heading: "Review Install Plan"
    text: >-
      Finally, review the install plan. A dry run shows what promotion would
      do: copy the checked deployment to the protected target, preserve or
      replace installed config according to flags, set ownership, write the
      systemd unit, and prepare the production service. The recording stops
      here, before real sudo or host mutation.
