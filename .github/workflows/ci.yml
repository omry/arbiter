name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Python lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up bootstrap Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install nox
        run: python -m pip install "nox[pbs]>=2024.10,<2026.0"

      - name: Run lint
        run: nox -s lint

  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install nox
        run: python -m pip install "nox[pbs]>=2024.10,<2026.0"

      - name: Run compatibility tests
        run: nox -s compat-${{ matrix.python-version }}

  platform-tests:
    name: Platform ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x64
            id: linux-x64
            runner: ubuntu-24.04
          - name: Linux arm64
            id: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macOS x64
            id: macos-x64
            runner: macos-15-intel
          - name: macOS arm64
            id: macos-arm64
            runner: macos-15
          - name: Windows x64
            id: windows-x64
            runner: windows-2025
          - name: Windows arm64
            id: windows-arm64
            runner: windows-11-arm
            python-tests: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: client-go/go.mod

      - name: Cache Go client smoke binary
        uses: actions/cache@v4
        with:
          path: .ci/go-client-smoke
          key: go-client-smoke-${{ matrix.platform.id }}-${{ hashFiles('client-go/**', 'tools/build_go_client') }}

      - name: Install nox
        run: python -m pip install "nox[pbs]>=2024.10,<2026.0"

      - name: Run Go client tests
        working-directory: client-go
        env:
          GOCACHE: ${{ runner.temp }}/go-build
        run: go test ./...

      - name: Run full test suite
        if: ${{ matrix.platform.python-tests != false }}
        env:
          ARBITER_GO_CLIENT_SMOKE_OUTDIR: .ci/go-client-smoke
          ARBITER_GO_CLIENT_SMOKE_REUSE: "1"
          GOCACHE: ${{ runner.temp }}/go-build
        run: nox -s tests

      - name: Skip Python suite on Windows arm64
        if: ${{ matrix.platform.python-tests == false }}
        run: |
          echo "Skipping Python suite on Windows arm64."
          echo "mcp depends on pyjwt[crypto], which pulls cryptography; the Windows arm64 runner currently has no usable wheel/toolchain path for that dependency."

  website:
    name: Website
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy-website:
    name: Deploy website
    runs-on: ubuntu-latest
    needs:
      - lint
      - tests
      - platform-tests
      - website
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
