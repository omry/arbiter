name: Publish
run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && format('Publish {0} on line {1} {2}', inputs.publish_packages || 'all', inputs.release_line, inputs.publish_to_pypi && 'to PyPI' || 'dry run') || format('Publish all from release {0}', github.event.release.tag_name) }}

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_line:
        description: "Release line to validate and build, for example 0.9"
        required: true
        type: string
      publish_to_pypi:
        description: "Publish built distributions to PyPI"
        required: true
        default: false
        type: boolean
      publish_packages:
        description: "Publish keys: all or comma-separated keys like core,imap,meta:all,skill:linux-amd64; meta:all is only the zero-code all-in-one meta package"
        required: true
        default: all
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    outputs:
      release_line: ${{ steps.release.outputs.release_line }}
      has_publish: ${{ steps.pypi-plan.outputs.has_publish }}
      publish_keys: ${{ steps.pypi-plan.outputs.publish_keys }}
      publish_specs: ${{ steps.pypi-plan.outputs.publish_specs }}
      publish_title: ${{ steps.pypi-plan.outputs.publish_title }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release line
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_LINE_INPUT: ${{ inputs.release_line }}
        run: |
          project_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' pyproject.toml | head -n 1)"
          if [[ -z "$project_version" ]]; then
            echo "Could not read project version from pyproject.toml" >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="$RELEASE_TAG"
            if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.0$ ]]; then
              echo "Release tags must use vMAJOR.MINOR.0, got: $tag" >&2
              exit 1
            fi
            release_line="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            expected_project_version="${release_line}.0"
            if [[ "$project_version" != "$expected_project_version" ]]; then
              echo "Project version $project_version does not match release tag $tag" >&2
              exit 1
            fi
          else
            release_line="$RELEASE_LINE_INPUT"
            if [[ ! "$release_line" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "Release line must use MAJOR.MINOR, got: $release_line" >&2
              exit 1
            fi
          fi
          echo "release_line=$release_line" >> "$GITHUB_OUTPUT"

      - name: Set up bootstrap Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: client-go/go.mod

      - name: Install build tools
        run: python -m pip install "nox[pbs]>=2024.10,<2026.0" build

      - name: Verify release line
        run: tools/upgrade_release_line "${{ steps.release.outputs.release_line }}" --check

      - name: Run lint
        run: nox -s lint

      - name: Run compatibility tests
        run: nox -s compat

      - name: Build core distribution
        run: python -m build --sdist --wheel --outdir dist core

      - name: Build IMAP plugin distribution
        run: python -m build --sdist --wheel --outdir dist imap

      - name: Build SMTP plugin distribution
        run: python -m build --sdist --wheel --outdir dist smtp

      - name: Build meta distribution
        run: python -m build --sdist --wheel --outdir dist .

      - name: Build Arbiter skill distributions
        run: |
          tools/build_go_client --clean
          tools/package_arbiter_skill --clean --format wheel
          cp dist/arbiter-skill/wheels/*.whl dist/

      - name: Plan selective PyPI publish
        id: pypi-plan
        shell: bash
        env:
          PUBLISH_PACKAGES: ${{ inputs.publish_packages || 'all' }}
        run: |
          args=(--prepare-output-dir --packages "$PUBLISH_PACKAGES")
          tools/plan_pypi_publish "${args[@]}"

      - name: Validate release notes
        if: >-
          steps.pypi-plan.outputs.has_publish == 'true' &&
          (github.event_name == 'release' ||
           (github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi))
        shell: bash
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          PUBLISH_KEYS: ${{ steps.pypi-plan.outputs.publish_keys }}
          PUBLISH_SPECS: ${{ steps.pypi-plan.outputs.publish_specs }}
        run: |
          IFS=',' read -ra package_keys <<< "$PUBLISH_KEYS"
          IFS=',' read -ra publish_specs <<< "$PUBLISH_SPECS"
          release_event_version="${RELEASE_EVENT_TAG#v}"
          for index in "${!package_keys[@]}"; do
            package_key="${package_keys[$index]}"
            package_version="${publish_specs[$index]##*==}"
            if [[ "${{ github.event_name }}" == "release" && "$package_version" != "$release_event_version" ]]; then
              echo "Release event tag $RELEASE_EVENT_TAG cannot publish $package_key version $package_version" >&2
              exit 1
            fi
            if [[ "$package_version" == *".dev"* ]]; then
              continue
            fi
            if [[ "$package_key" == skill* ]]; then
              continue
            fi
            tools/extract_release_notes \
              "$package_version" \
              --package-key "$package_key" \
              > /dev/null
          done

      - name: Summarize publish plan
        if: steps.pypi-plan.outputs.has_publish == 'true'
        env:
          PUBLISH_KEYS: ${{ steps.pypi-plan.outputs.publish_keys }}
          PUBLISH_SPECS: ${{ steps.pypi-plan.outputs.publish_specs }}
          PUBLISH_TITLE: ${{ steps.pypi-plan.outputs.publish_title }}
        run: |
          {
            echo "### Publish plan"
            echo
            echo "- Release line: ${{ steps.release.outputs.release_line }}"
            echo "- Package keys: $PUBLISH_KEYS"
            echo "- Package specs: $PUBLISH_SPECS"
            echo "- Publish title: publishing $PUBLISH_TITLE to PyPI"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke install built release
        if: steps.pypi-plan.outputs.has_publish == 'true'
        shell: bash
        env:
          PUBLISH_SPECS: ${{ steps.pypi-plan.outputs.publish_specs }}
        run: |
          python -m venv .release-smoke
          .release-smoke/bin/python -m pip install --upgrade pip
          IFS=',' read -ra publish_specs <<< "$PUBLISH_SPECS"
          .release-smoke/bin/python -m pip install --find-links dist "${publish_specs[@]}"
          run_server_smoke=false
          for spec in "${publish_specs[@]}"; do
            package_name="${spec%%==*}"
            if [[ "$package_name" == arbiter-skill* ]]; then
              module_name="${package_name//-/_}"
              .release-smoke/bin/python -c "__import__('$module_name')"
            else
              run_server_smoke=true
            fi
          done
          if [[ "$run_server_smoke" == true ]]; then
            .release-smoke/bin/arbiter-server version --json
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

      - name: Upload publishable distributions
        if: steps.pypi-plan.outputs.has_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-to-publish
          path: dist-publish/*
          if-no-files-found: error

  publish:
    name: publishing ${{ needs.build.outputs.publish_title }} to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      needs.build.result == 'success' &&
      needs.build.outputs.has_publish == 'true' &&
      (github.event_name == 'release' ||
       (github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main' &&
        inputs.publish_to_pypi))
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download publishable distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions-to-publish
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1

  release_notes:
    name: Attach release notes
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.build.outputs.has_publish == 'true' &&
      needs.publish.result == 'success' &&
      (github.event_name == 'release' ||
       (github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main' &&
        inputs.publish_to_pypi))
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Attach release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          PUBLISH_KEYS: ${{ needs.build.outputs.publish_keys }}
          PUBLISH_SPECS: ${{ needs.build.outputs.publish_specs }}
        run: |
          IFS=',' read -ra package_keys <<< "$PUBLISH_KEYS"
          IFS=',' read -ra publish_specs <<< "$PUBLISH_SPECS"
          declare -A notes_files=()
          release_tags=()
          for index in "${!package_keys[@]}"; do
            package_key="${package_keys[$index]}"
            package_version="${publish_specs[$index]##*==}"
            if [[ "$package_key" == skill* ]]; then
              continue
            fi
            if [[ "$package_version" == *".dev"* ]]; then
              continue
            fi
            release_tag="${RELEASE_EVENT_TAG:-v$package_version}"
            if [[ -z "${notes_files[$release_tag]:-}" ]]; then
              notes_file="release-notes-${#release_tags[@]}.md"
              notes_files[$release_tag]="$notes_file"
              release_tags+=("$release_tag")
              : > "$notes_file"
            fi
            tools/extract_release_notes \
              "$package_version" \
              --package-key "$package_key" \
              >> "${notes_files[$release_tag]}"
            printf '\n' >> "${notes_files[$release_tag]}"
          done
          for release_tag in "${release_tags[@]}"; do
            notes_file="${notes_files[$release_tag]}"
            if gh release view "$release_tag" >/dev/null 2>&1; then
              gh release edit "$release_tag" --notes-file "$notes_file"
            else
              gh release create "$release_tag" \
                --target "$GITHUB_SHA" \
                --title "$release_tag" \
                --notes-file "$notes_file"
            fi
          done
