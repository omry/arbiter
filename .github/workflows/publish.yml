name: Publish
run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && format('Publish {0} on line {1} {2}', inputs.publish_packages || 'all', inputs.release_line, inputs.publish_to_pypi && 'to PyPI' || 'dry run') || format('Publish all from release {0}', github.event.release.tag_name) }}

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_line:
        description: "Release line to validate and build, for example 0.9"
        required: true
        type: string
      release_version:
        description: "Optional exact selected-package version for fine-grained releases, for example 0.9.1"
        required: false
        type: string
      publish_to_pypi:
        description: "Publish built distributions to PyPI"
        required: true
        default: false
        type: boolean
      publish_packages:
        description: "Publish keys: all or comma-separated keys like core,imap,meta:all; meta:all is only the zero-code all-in-one meta package"
        required: true
        default: all
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    outputs:
      release_line: ${{ steps.release.outputs.release_line }}
      release_version: ${{ steps.release.outputs.release_version }}
      has_publish: ${{ steps.pypi-plan.outputs.has_publish }}
      publish_keys: ${{ steps.pypi-plan.outputs.publish_keys }}
      publish_specs: ${{ steps.pypi-plan.outputs.publish_specs }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_LINE_INPUT: ${{ inputs.release_line }}
          RELEASE_VERSION_INPUT: ${{ inputs.release_version }}
        run: |
          project_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' pyproject.toml | head -n 1)"
          if [[ -z "$project_version" ]]; then
            echo "Could not read project version from pyproject.toml" >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="$RELEASE_TAG"
            if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.0$ ]]; then
              echo "Release tags must use vMAJOR.MINOR.0, got: $tag" >&2
              exit 1
            fi
            release_line="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            release_version="${release_line}.0"
            if [[ "$project_version" != "$release_version" ]]; then
              echo "Project version $project_version does not match release tag $tag" >&2
              exit 1
            fi
          else
            release_line="$RELEASE_LINE_INPUT"
            if [[ ! "$release_line" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "Release line must use MAJOR.MINOR, got: $release_line" >&2
              exit 1
            fi
            release_version="${RELEASE_VERSION_INPUT:-$project_version}"
            if [[ ! "$release_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(\.dev(0|[1-9][0-9]*))?$ ]]; then
              echo "Release version must use MAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH.devN, got: $release_version" >&2
              exit 1
            fi
            if [[ "$release_version" != "$release_line".* ]]; then
              echo "Project version $release_version is not on release line $release_line" >&2
              exit 1
            fi
          fi
          echo "release_line=$release_line" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Set up bootstrap Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: python -m pip install "nox[pbs]>=2024.10,<2026.0" build

      - name: Verify release line
        if: >-
          github.event_name == 'release' ||
          inputs.release_version == ''
        run: tools/upgrade_release_line "${{ steps.release.outputs.release_line }}" --check

      - name: Run lint
        run: nox -s lint

      - name: Run compatibility tests
        run: nox -s compat

      - name: Build core distribution
        run: python -m build --sdist --wheel --outdir dist core

      - name: Build IMAP plugin distribution
        run: python -m build --sdist --wheel --outdir dist imap

      - name: Build SMTP plugin distribution
        run: python -m build --sdist --wheel --outdir dist smtp

      - name: Build meta distribution
        run: python -m build --sdist --wheel --outdir dist .

      - name: Plan selective PyPI publish
        id: pypi-plan
        shell: bash
        env:
          PUBLISH_PACKAGES: ${{ inputs.publish_packages || 'all' }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          args=(--prepare-output-dir --packages "$PUBLISH_PACKAGES")
          if [[ -n "$RELEASE_VERSION" ]]; then
            args+=(--release-version "$RELEASE_VERSION")
          fi
          tools/plan_pypi_publish "${args[@]}"

      - name: Validate release notes
        if: >-
          steps.pypi-plan.outputs.has_publish == 'true' &&
          !contains(steps.release.outputs.release_version, '.dev') &&
          (github.event_name == 'release' ||
           (github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi))
        shell: bash
        env:
          PUBLISH_KEYS: ${{ steps.pypi-plan.outputs.publish_keys }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
        run: |
          IFS=',' read -ra package_keys <<< "$PUBLISH_KEYS"
          for package_key in "${package_keys[@]}"; do
            tools/extract_release_notes \
              "$RELEASE_VERSION" \
              --package-key "$package_key" \
              > /dev/null
          done

      - name: Summarize publish plan
        if: steps.pypi-plan.outputs.has_publish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          PUBLISH_KEYS: ${{ steps.pypi-plan.outputs.publish_keys }}
          PUBLISH_SPECS: ${{ steps.pypi-plan.outputs.publish_specs }}
        run: |
          {
            echo "### Publish plan"
            echo
            echo "- Release version: $RELEASE_VERSION"
            echo "- Package keys: $PUBLISH_KEYS"
            echo "- Package specs: $PUBLISH_SPECS"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke install built release
        if: steps.pypi-plan.outputs.has_publish == 'true'
        shell: bash
        env:
          PUBLISH_SPECS: ${{ steps.pypi-plan.outputs.publish_specs }}
        run: |
          python -m venv .release-smoke
          .release-smoke/bin/python -m pip install --upgrade pip
          IFS=',' read -ra publish_specs <<< "$PUBLISH_SPECS"
          .release-smoke/bin/python -m pip install --find-links dist "${publish_specs[@]}"
          .release-smoke/bin/arbiter-server version --json

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

      - name: Upload publishable distributions
        if: steps.pypi-plan.outputs.has_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-to-publish
          path: dist-publish/*
          if-no-files-found: error

  publish:
    name: Publish ${{ needs.build.outputs.publish_specs }} to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      needs.build.result == 'success' &&
      needs.build.outputs.has_publish == 'true' &&
      (github.event_name == 'release' ||
       (github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main' &&
        inputs.publish_to_pypi))
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download publishable distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions-to-publish
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1

  release_notes:
    name: Attach release notes
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.build.outputs.has_publish == 'true' &&
      needs.publish.result == 'success' &&
      !contains(needs.build.outputs.release_version, '.dev') &&
      (github.event_name == 'release' ||
       (github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main' &&
        inputs.publish_to_pypi))
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Attach release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          PUBLISH_KEYS: ${{ needs.build.outputs.publish_keys }}
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
        run: |
          release_tag="${RELEASE_EVENT_TAG:-v$RELEASE_VERSION}"
          IFS=',' read -ra package_keys <<< "$PUBLISH_KEYS"
          : > release-notes.md
          for package_key in "${package_keys[@]}"; do
            tools/extract_release_notes \
              "$RELEASE_VERSION" \
              --package-key "$package_key" \
              >> release-notes.md
            printf '\n' >> release-notes.md
          done
          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release edit "$release_tag" --notes-file release-notes.md
          else
            gh release create "$release_tag" \
              --target "$GITHUB_SHA" \
              --title "$release_tag" \
              --notes-file release-notes.md
          fi
