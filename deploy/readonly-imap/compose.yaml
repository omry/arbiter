services:
  arbiter-readonly:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: arbiter:readonly-local
    container_name: arbiter-readonly
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      ARBITER_SERVER_HOST: 0.0.0.0
      ARBITER_SERVER_PORT: 8025
      ARBITER_SERVER_PATH: /mcp
      ARBITER_IMAP_HOST: ${ARBITER_IMAP_HOST:?set ARBITER_IMAP_HOST}
      ARBITER_IMAP_PORT: ${ARBITER_IMAP_PORT:-993}
      ARBITER_IMAP_TLS: ${ARBITER_IMAP_TLS:-implicit}
      ARBITER_IMAP_VERIFY_PEER: ${ARBITER_IMAP_VERIFY_PEER:-true}
      ARBITER_IMAP_TIMEOUT_SECONDS: ${ARBITER_IMAP_TIMEOUT_SECONDS:-30.0}
      ARBITER_IMAP_USERNAME_FILE: /run/secrets/imap_username
      ARBITER_IMAP_PASSWORD_FILE: /run/secrets/imap_password
    secrets:
      - source: imap_username
        target: imap_username
        uid: "0"
        gid: "10001"
        mode: 0440
      - source: imap_password
        target: imap_password
        uid: "0"
        gid: "10001"
        mode: 0440
    volumes:
      - ${ARBITER_CONFIG_FILE:-./config.yaml}:/config/config.yaml:ro
    ports:
      - "127.0.0.1:${ARBITER_HOST_PORT:-8025}:8025"

secrets:
  imap_username:
    file: ${ARBITER_SECRET_DIR:-/opt/arbiter-readonly/secrets}/imap_username
  imap_password:
    file: ${ARBITER_SECRET_DIR:-/opt/arbiter-readonly/secrets}/imap_password
