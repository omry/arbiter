services:
  agent-arbiter-readonly:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: agent-arbiter:readonly-local
    container_name: agent-arbiter-readonly
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      AGENT_ARBITER_SERVER_HOST: 0.0.0.0
      AGENT_ARBITER_SERVER_PORT: 8025
      AGENT_ARBITER_SERVER_PATH: /mcp
      AGENT_ARBITER_IMAP_HOST: ${AGENT_ARBITER_IMAP_HOST:?set AGENT_ARBITER_IMAP_HOST}
      AGENT_ARBITER_IMAP_PORT: ${AGENT_ARBITER_IMAP_PORT:-993}
      AGENT_ARBITER_IMAP_TLS: ${AGENT_ARBITER_IMAP_TLS:-implicit}
      AGENT_ARBITER_IMAP_VERIFY_PEER: ${AGENT_ARBITER_IMAP_VERIFY_PEER:-true}
      AGENT_ARBITER_IMAP_TIMEOUT_SECONDS: ${AGENT_ARBITER_IMAP_TIMEOUT_SECONDS:-30.0}
      AGENT_ARBITER_IMAP_USERNAME_FILE: /run/secrets/imap_username
      AGENT_ARBITER_IMAP_PASSWORD_FILE: /run/secrets/imap_password
    secrets:
      - source: imap_username
        target: imap_username
        uid: "0"
        gid: "10001"
        mode: 0440
      - source: imap_password
        target: imap_password
        uid: "0"
        gid: "10001"
        mode: 0440
    volumes:
      - ${AGENT_ARBITER_CONFIG_FILE:-./config.yaml}:/config/config.yaml:ro
    ports:
      - "127.0.0.1:${AGENT_ARBITER_HOST_PORT:-8025}:8025"

secrets:
  imap_username:
    file: ${AGENT_ARBITER_SECRET_DIR:-/opt/agent-arbiter-readonly/secrets}/imap_username
  imap_password:
    file: ${AGENT_ARBITER_SECRET_DIR:-/opt/agent-arbiter-readonly/secrets}/imap_password
