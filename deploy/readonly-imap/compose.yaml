services:
  mail-sentry-readonly:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: mail-sentry:readonly-local
    container_name: mail-sentry-readonly
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      MAIL_SENTRY_SERVER_HOST: 0.0.0.0
      MAIL_SENTRY_SERVER_PORT: 8025
      MAIL_SENTRY_SERVER_PATH: /mcp
      MAIL_SENTRY_IMAP_HOST: ${MAIL_SENTRY_IMAP_HOST:?set MAIL_SENTRY_IMAP_HOST}
      MAIL_SENTRY_IMAP_PORT: ${MAIL_SENTRY_IMAP_PORT:-993}
      MAIL_SENTRY_IMAP_TLS: ${MAIL_SENTRY_IMAP_TLS:-implicit}
      MAIL_SENTRY_IMAP_VERIFY_PEER: ${MAIL_SENTRY_IMAP_VERIFY_PEER:-true}
      MAIL_SENTRY_IMAP_TIMEOUT_SECONDS: ${MAIL_SENTRY_IMAP_TIMEOUT_SECONDS:-30.0}
      MAIL_SENTRY_IMAP_USERNAME_FILE: /run/secrets/imap_username
      MAIL_SENTRY_IMAP_PASSWORD_FILE: /run/secrets/imap_password
    secrets:
      - source: imap_username
        target: imap_username
        uid: "0"
        gid: "10001"
        mode: 0440
      - source: imap_password
        target: imap_password
        uid: "0"
        gid: "10001"
        mode: 0440
    volumes:
      - ${MAIL_SENTRY_CONFIG_FILE:-./config.yaml}:/config/config.yaml:ro
    ports:
      - "127.0.0.1:${MAIL_SENTRY_HOST_PORT:-8025}:8025"

secrets:
  imap_username:
    file: ${MAIL_SENTRY_SECRET_DIR:-/opt/mail-sentry-readonly/secrets}/imap_username
  imap_password:
    file: ${MAIL_SENTRY_SECRET_DIR:-/opt/mail-sentry-readonly/secrets}/imap_password
