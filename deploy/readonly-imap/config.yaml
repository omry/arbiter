defaults:
  - arbiter_app_config_schema
  - /arbiter/server: streamable-http
  - /arbiter/account/imap/schema@arbiter.account.imap.primary
  - /arbiter/policy/imap/schema@arbiter.policy.imap.alerts_readonly
  - _self_

hydra:
  run:
    dir: /tmp/hydra
  output_subdir: null
  job:
    chdir: false

arbiter:
  server:
    name: arbiter-readonly
    transport: streamable-http
    host: ${oc.env:ARBITER_SERVER_HOST,0.0.0.0}
    port: ${oc.env:ARBITER_SERVER_PORT,8025}
    path: ${oc.env:ARBITER_SERVER_PATH,/mcp}
    stateless_http: true
    json_response: true

  account:
    smtp: {}
    imap:
      primary:
        policy: alerts_readonly
        description: Read-only view of a selected alert folder.
        host: ${arbiter.etc.mailserver.host}
        port: ${arbiter.etc.mailserver.port}
        username: ${arbiter.etc.mailserver.username}
        password: ${arbiter.etc.mailserver.password}
        tls: ${oc.env:ARBITER_IMAP_TLS,implicit}
        verify_peer: ${oc.env:ARBITER_IMAP_VERIFY_PEER,true}
        timeout_seconds: ${oc.env:ARBITER_IMAP_TIMEOUT_SECONDS,30.0}
        default_folder: TARGET_IMAP_FOLDER
        folders:
          TARGET_IMAP_FOLDER:
            description: Selected read-only alert folder.

  policy:
    smtp: {}
    imap:
      alerts_readonly:
        allow_read: true
        allow_search: true
        allow_move: false
        allow_delete: false
        confirmation_required: []
        system_flags:
          seen: read_only
          flagged: read_only
          answered: read_only
          deleted: read_only
          draft: read_only
        user_flags: {}

  etc:
    mailserver:
      host: ${oc.env:ARBITER_IMAP_HOST}
      port: ${oc.env:ARBITER_IMAP_PORT,993}
      username: ${secret_file:${oc.env:ARBITER_IMAP_USERNAME_FILE,/run/secrets/imap_username}}
      password: ${secret_file:${oc.env:ARBITER_IMAP_PASSWORD_FILE,/run/secrets/imap_password}}
