defaults:
  - mail_sentry_app_config_schema
  - _self_

hydra:
  run:
    dir: /tmp/hydra
  output_subdir: null
  job:
    chdir: false

server:
  name: mail-sentry-readonly
  transport: streamable-http
  host: ${oc.env:MAIL_SENTRY_SERVER_HOST,0.0.0.0}
  port: ${oc.env:MAIL_SENTRY_SERVER_PORT,8025}
  path: ${oc.env:MAIL_SENTRY_SERVER_PATH,/mcp}
  stateless_http: true
  json_response: true

mail:
  account_access_profiles:
    alerts_readonly:
      services:
        imap:
          allow_read: true
          allow_search: true
          allow_move: false
          allow_delete: false
          confirmation_required: []
          system_flags:
            seen: read_only
            flagged: read_only
            answered: read_only
            deleted: read_only
            draft: read_only
          user_flags: {}
  accounts:
    primary:
      description: Read-only view of a selected alert folder.
      account_access_profile: alerts_readonly

etc:
  mailserver:
    host: ${oc.env:MAIL_SENTRY_IMAP_HOST}
    port: ${oc.env:MAIL_SENTRY_IMAP_PORT,993}
    username: ${secret_file:${oc.env:MAIL_SENTRY_IMAP_USERNAME_FILE,/run/secrets/imap_username}}
    password: ${secret_file:${oc.env:MAIL_SENTRY_IMAP_PASSWORD_FILE,/run/secrets/imap_password}}

services:
  smtp: null
  imap:
    accounts:
      primary:
        host: ${etc.mailserver.host}
        port: ${etc.mailserver.port}
        username: ${etc.mailserver.username}
        password: ${etc.mailserver.password}
        tls: ${oc.env:MAIL_SENTRY_IMAP_TLS,implicit}
        verify_peer: ${oc.env:MAIL_SENTRY_IMAP_VERIFY_PEER,true}
        timeout_seconds: ${oc.env:MAIL_SENTRY_IMAP_TIMEOUT_SECONDS,30.0}
        default_folder: TARGET_IMAP_FOLDER
        folders:
          TARGET_IMAP_FOLDER:
            description: Selected read-only alert folder.
