services:
  arbiter:
    image: python:3.11-slim
    container_name: arbiter
    restart: unless-stopped
    env_file:
      - ./arbiter.env
    environment:
      # Bind to all container interfaces so Docker's host-loopback port publish can
      # reach the service. The service stays host-local because ports publish
      # only on 127.0.0.1.
      ARBITER_SERVER_HOST: 0.0.0.0
      ARBITER_INSTALL_TARGET: ${ARBITER_CONTAINER_INSTALL_TARGET:?set ARBITER_CONTAINER_INSTALL_TARGET}
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - ${ARBITER_LOCAL_SOURCE_DIR:-./empty-source}:/source/arbiter:ro
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - arbiter
    command: >
      sh -lc
      'install_target="$${ARBITER_INSTALL_TARGET}" &&
      if [ "$$install_target" = /source/arbiter ]; then
        rm -rf /tmp/arbiter-source &&
        rm -rf /tmp/arbiter-wheels &&
        mkdir -p /tmp/arbiter-source &&
        mkdir -p /tmp/arbiter-wheels &&
        cp -a /source/arbiter/README.md /source/arbiter/core /source/arbiter/smtp /source/arbiter/imap /tmp/arbiter-source/ &&
        find /tmp/arbiter-source -type d \( -name "*.egg-info" -o -name "__pycache__" \) -prune -exec rm -rf {} + &&
        python -m pip wheel --no-cache-dir --no-deps --wheel-dir /tmp/arbiter-wheels /tmp/arbiter-source/core /tmp/arbiter-source/smtp /tmp/arbiter-source/imap &&
        python -m pip install --no-cache-dir /tmp/arbiter-wheels/*.whl;
      else
        python -m pip install --no-cache-dir "$$install_target";
      fi &&
      exec arbiter-server --config-dir /config --config-name config serve'

networks:
  arbiter:
    name: arbiter
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "${ARBITER_DOCKER_BRIDGE_NAME:-arbiter0}"
    ipam:
      config:
        # Override only if the default subnet conflicts with another host network.
        - subnet: "${ARBITER_DOCKER_SUBNET:-172.31.250.0/24}"
