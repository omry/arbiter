defaults:
  - agent_arbiter_app_config_schema
  - /arbiter/server: streamable-http
  - /arbiter/account/smtp/schema@arbiter.account.smtp.primary
  - /arbiter/account/smtp/schema@arbiter.account.smtp.personal
  - /arbiter/account/imap/schema@arbiter.account.imap.primary
  - /arbiter/policy/smtp/schema@arbiter.policy.smtp.bot
  - /arbiter/policy/smtp/schema@arbiter.policy.smtp.personal
  - /arbiter/policy/imap/schema@arbiter.policy.imap.bot
  - _self_

arbiter:
  server:
    name: arbiter-mcp
    transport: streamable-http
    host: ${oc.env:ARBITER_SERVER_HOST,127.0.0.1}
    port: ${oc.env:ARBITER_SERVER_PORT,8025}
    path: ${oc.env:ARBITER_SERVER_PATH,/mcp}
    stateless_http: true
    json_response: true

  account:
    smtp:
      primary:
        policy: bot
        description: Bot account for automated email tasks
        host: ${arbiter.etc.bot_mailserver.smtp_host}
        port: ${arbiter.etc.bot_mailserver.smtp_port}
        authenticate: ${oc.env:ARBITER_BOT_SMTP_AUTHENTICATE,true}
        username: ${arbiter.etc.bot_mailserver.username}
        password: ${arbiter.etc.bot_mailserver.password}
        from_email: ${oc.env:ARBITER_BOT_SMTP_FROM_EMAIL}
        from_name: ${oc.env:ARBITER_BOT_SMTP_FROM_NAME,Arbiter Bot}
        tls: ${oc.env:ARBITER_BOT_SMTP_TLS,starttls}
        verify_peer: ${oc.env:ARBITER_BOT_SMTP_VERIFY_PEER,true}
        timeout_seconds: ${oc.env:ARBITER_BOT_SMTP_TIMEOUT_SECONDS,30.0}
      personal:
        policy: personal
        description: Personal account
        host: ${arbiter.etc.personal_mailserver.smtp_host}
        port: ${arbiter.etc.personal_mailserver.smtp_port}
        authenticate: ${oc.env:ARBITER_PERSONAL_SMTP_AUTHENTICATE,true}
        username: ${arbiter.etc.personal_mailserver.username}
        password: ${arbiter.etc.personal_mailserver.password}
        from_email: ${oc.env:ARBITER_PERSONAL_SMTP_FROM_EMAIL}
        from_name: ${oc.env:ARBITER_PERSONAL_SMTP_FROM_NAME,Omry}
        tls: ${oc.env:ARBITER_PERSONAL_SMTP_TLS,starttls}
        verify_peer: ${oc.env:ARBITER_PERSONAL_SMTP_VERIFY_PEER,true}
        timeout_seconds: ${oc.env:ARBITER_PERSONAL_SMTP_TIMEOUT_SECONDS,30.0}
    imap:
      primary:
        policy: bot
        description: Bot account for automated email tasks
        host: ${arbiter.etc.bot_mailserver.imap_host}
        port: ${arbiter.etc.bot_mailserver.imap_port}
        username: ${oc.env:ARBITER_BOT_IMAP_USERNAME}
        password: ${oc.env:ARBITER_BOT_IMAP_PASSWORD}
        tls: ${oc.env:ARBITER_BOT_IMAP_TLS,implicit}
        verify_peer: ${oc.env:ARBITER_BOT_IMAP_VERIFY_PEER,true}
        timeout_seconds: ${oc.env:ARBITER_BOT_IMAP_TIMEOUT_SECONDS,30.0}
        default_folder: INBOX
        folders:
          INBOX:
            description: Bot inbox.

  policy:
    smtp:
      bot:
        require_confirmation: false
      personal:
        require_confirmation: true
    imap:
      bot:
        allow_read: true
        allow_search: true
        allow_move: true
        allow_delete: true
        confirmation_required: []
        user_flags: {}

  etc:
    bot_mailserver:
      smtp_host: ${oc.env:ARBITER_BOT_SMTP_HOST}
      smtp_port: ${oc.env:ARBITER_BOT_SMTP_PORT,587}
      imap_host: ${oc.env:ARBITER_BOT_IMAP_HOST}
      imap_port: ${oc.env:ARBITER_BOT_IMAP_PORT,993}
      username: ${oc.env:ARBITER_BOT_SMTP_USERNAME}
      password: ${oc.env:ARBITER_BOT_SMTP_PASSWORD}
    personal_mailserver:
      smtp_host: ${oc.env:ARBITER_PERSONAL_SMTP_HOST}
      smtp_port: ${oc.env:ARBITER_PERSONAL_SMTP_PORT,587}
      username: ${oc.env:ARBITER_PERSONAL_SMTP_USERNAME}
      password: ${oc.env:ARBITER_PERSONAL_SMTP_PASSWORD}
