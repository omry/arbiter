installer:
  version: 1
  external_wheels:
    - package: "arbiter-client==${package.version}"
      editable: ../client
      copies:
        - wheel_path: arbiter_client/bin/arbiter
          skill_path: bin/arbiter
          executable: true
          replace: true
  shared:
    instructions:
      discoverability:
        title: Arbiter
        body: Use this skill when you need to access external services via a secured and authorized access interface.
  agents:
    codex:
      instructions: ${installer.shared.instructions.discoverability}
    claude:
      instructions: ${installer.shared.instructions.discoverability}
