services:
  arbiter:
    image: ${ARBITER_IMAGE:-python:3.11-slim}
    container_name: ${ARBITER_CONTAINER_NAME:-arbiter}
    restart: ${ARBITER_RESTART:-unless-stopped}
    env_file:
      - ${ARBITER_APP_ENV_FILE:-./conf/.env}
    environment:
      # Bind to all container interfaces so Docker's host-loopback port publish can
      # reach the service. The service stays host-local because ports publish
      # only on 127.0.0.1.
      ARBITER_SERVER_HOST: 0.0.0.0
      ARBITER_CONTAINER_PORT: ${ARBITER_CONTAINER_PORT:-8025}
      ARBITER_CONFIG_NAME: ${ARBITER_CONFIG_NAME:-arbiter-server}
    volumes:
      - ${ARBITER_CONFIG_DIR:-./conf}:/config:ro
      - ${ARBITER_REQUIREMENTS_FILE:-./requirements.txt}:/requirements.txt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${ARBITER_HOST_BIND:-127.0.0.1}:${ARBITER_HOST_PORT:-8025}:${ARBITER_CONTAINER_PORT:-8025}"
    networks:
      - arbiter
    command: >
      sh -lc
      'if grep -q "/source/arbiter" /requirements.txt; then
        rm -rf /tmp/arbiter-source &&
        rm -rf /tmp/arbiter-wheels &&
        mkdir -p /tmp/arbiter-source &&
        mkdir -p /tmp/arbiter-wheels &&
        cp -a /source/arbiter/. /tmp/arbiter-source/ &&
        find /tmp/arbiter-source -type d \( -name "*.egg-info" -o -name "__pycache__" \) -prune -exec rm -rf {} + &&
        sed "s#/source/arbiter#/tmp/arbiter-source#g" /requirements.txt > /tmp/requirements.txt &&
        awk "!/^[[:space:]]*(#|$)/ && !/^[[:space:]]*\\/tmp\\/arbiter-source\\// { print }" /tmp/requirements.txt > /tmp/requirements.pinned &&
        awk "/^[[:space:]]*\\/tmp\\/arbiter-source\\// { print }" /tmp/requirements.txt | while IFS= read -r requirement; do
          python -m pip wheel --no-cache-dir --no-deps --wheel-dir /tmp/arbiter-wheels "$$requirement";
        done &&
        if [ -d /wheels ] && find /wheels -maxdepth 1 -name "*.whl" -print -quit | grep -q .; then
          python -m pip install --no-cache-dir --no-index --find-links /wheels -r /tmp/requirements.pinned /tmp/arbiter-wheels/*.whl;
        else
          python -m pip install --no-cache-dir -r /tmp/requirements.pinned /tmp/arbiter-wheels/*.whl;
        fi;
      elif [ -d /wheels ] && find /wheels -maxdepth 1 -name "*.whl" -print -quit | grep -q .; then
        python -m pip install --no-cache-dir --no-index --find-links /wheels -r /requirements.txt;
      else
        python -m pip install --no-cache-dir -r /requirements.txt;
      fi &&
      exec arbiter-server --config-dir /config --config-name "$ARBITER_CONFIG_NAME" serve "arbiter.server.host=$ARBITER_SERVER_HOST" "arbiter.server.port=$ARBITER_CONTAINER_PORT"'

networks:
  arbiter:
    name: ${ARBITER_DOCKER_NETWORK_NAME:-arbiter}
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "${ARBITER_DOCKER_BRIDGE_NAME:-arbiter0}"
    ipam:
      config:
        # Override only if the default subnet conflicts with another host network.
        - subnet: "${ARBITER_DOCKER_SUBNET:-172.31.250.0/24}"
